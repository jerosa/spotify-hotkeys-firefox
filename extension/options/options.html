<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Hotkeys Options</title>
    <link rel="stylesheet" href="options.css"/>
</head>

<body>
    <main>
        <h2>Settings</h2>
        <ul>
            <li class="setting">
                <input type="checkbox" id="chOpenSpotify">
                <label for="chOpenSpotify">Open Spotify with shortcuts</label>
            </li>
            <li class="setting">
                <input type="checkbox" id="chSpotifyNotifications">
                <label for="chSpotifyNotifications">
                    Create notifications when song changes
                </label>
            </li>
        </ul>
        <h2>Shortcuts</h2>
        <p>
            Customize keyboard shortcuts in
            <a href="https://support.mozilla.org/kb/manage-extension-shortcuts-firefox"
               target="_blank" rel="noopener">Firefox extension settings</a>.
        </p>
    </main>
    <footer>
        <a href="https://addons.mozilla.org/firefox/addon/spotify-hotkeys/"
           target="_blank" rel="noopener">Add a Review</a> |
        <a href="https://github.com/TsunDoge/spotify-hotkeys-firefox/wiki/How-to-use-Spotify-Shortcuts"
           target="_blank" rel="noopener">Documentation</a> |
        <a href="https://github.com/TsunDoge/spotify-hotkeys-firefox/issues"
           target="_blank" rel="noopener">Support</a>
    </footer>
    <script src="options.js"></script>
</body>

</html>
